seed: 42

model:
  vocab_size: 100258
  d_model: 2048
  n_heads: 16
  d_ff: 8192
  n_layers: 24
  max_seq_len: 4096
  pos: "learned"

data:
  task: "language"
  dataset_name: "HuggingFaceFW/fineweb-edu"
  batch_size: 4
  seq_len: 2048
  streaming: true

optim:
  lr: 0.0003
  max_steps: 100000
  warmup_steps: 2000
  weight_decay: 0.1
  grad_clip: 1.0

subsystems:
  controller: true
  dyn_patch: true
  attn_budget: true
  moe: true
  memory: true
  latent_loop: true
  vision: true

patch:
  patch_hidden: 64
  aux_weight: 1.0

budget:
  cost: 0.01

eval:
  interval: 1000
  batches: 50
