
seed: 42

model:
  vocab_size: 100258
  d_model: 256
  n_heads: 4
  n_kv_heads: 2
  d_ff: 1024
  n_layers: 2
  max_seq_len: 256
  pos: "rope"
  rope_theta: 500000.0
  sliding_window: 128
  quantize_kv: false

data:
  task: "language"
  dataset_name: "roneneldan/TinyStories"
  batch_size: 8
  seq_len: 256

optim:
  lr: 0.0003
  max_steps: 20000
  warmup_steps: 500
  weight_decay: 0.1
  grad_clip: 1.0
  precision: "bf16"
  gpu_delay: 0.0

subsystems:
  controller: true
  dyn_patch: true
  attn_budget: true
  moe: true
  memory: true
  latent_loop: false
  mtp: true
  mtp_depth: 1
  vision: true

patch:
  patch_hidden: 32
  aux_weight: 1.0

budget:
  cost: 0.01

eval:
  interval: 1000
  batches: 50
