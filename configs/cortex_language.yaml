
seed: 42

model:
  vocab_size: 100258
  d_model: 384
  n_heads: 6
  d_ff: 1536
  n_layers: 4
  max_seq_len: 256
  pos: "learned"

data:
  task: "language"
  dataset_name: "roneneldan/TinyStories"
  batch_size: 8
  seq_len: 128

optim:
  lr: 0.001
  max_steps: 50000
  warmup_steps: 500
  weight_decay: 0.1
  grad_clip: 1.0

subsystems:
  controller: true
  dyn_patch: true
  attn_budget: true
  moe: false
  memory: true
  latent_loop: false

patch:
  patch_hidden: 32
  aux_weight: 1.0

budget:
  cost: 0.01

eval:
  interval: 1000
  batches: 50
