


seed: 0
run_name: decoupled

control_mode: decoupled

model:
  size: 10M
  vocab_size: 260
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_ff: 1536
  max_seq_len: 512
  dropout: 0.0
  norm: pre
  tie_embeddings: true

data:
  task: needle
  seq_len: 256
  batch_size: 32
  n_values: 32

eval:
  interval: 100
  batches: 8


patch:
  aux_weight: 1.0
  patch_hidden: 64
  patch_ctx_weight: 0.5
  patch_use_signal: false

optim:
  lr: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 200
  max_steps: 2000
  grad_clip: 1.0
  precision: bf16
  grad_checkpoint: false


subsystems:
  controller: true
  dyn_patch: true
  nope: true
  attn_budget: true
  structured_residual: true
  halting: true
  latent_loop: true
  moe: true
  memory: true
  consolidate: true
  spec_decode: true
