<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0B0F19;
            color: #f8fafc;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        body {
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: #050509;
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            padding: 24px;
            height: 100vh;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 3px;
        }
        .sidebar-logo {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0;
        }
        .sidebar-logo svg {
            width: 24px;
            height: 24px;
            fill: #3b82f6;
        }
        .sidebar-item {
            padding: 10px 12px;
            border-radius: 8px;
            color: #94a3b8;
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }
        .sidebar-item .left-icon {
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-item:hover {
            background-color: #1e293b;
            color: #f1f5f9;
        }
        .sidebar-item.active {
            background-color: #1e293b;
            color: #60a5fa; /* Light blue for active item */
        }
        .sidebar-item.active svg, .sidebar-item.active .emoji {
            opacity: 1;
        }
        .sidebar-section {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            margin-top: 25px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Chat Area Styling */
        .chat-area {
            flex-grow: 1;
            background-color: #0b0f19;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        .center-content {
            width: 100%;
            max-width: 700px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        h1.greeting {
            font-size: 32px;
            font-weight: 500;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Input Box Styling */
        .input-container {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100%;
            margin-bottom: 24px;
            box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .input-container:focus-within {
            border-color: #3b82f6;
        }

        .input-container input {
            background-color: transparent !important;
            border: none !important;
            color: #e2e8f0 !important;
            font-size: 15px !important;
            padding: 12px !important;
            height: 24px !important;
            flex-grow: 1 !important;
            outline: none !important;
            font-family: 'Inter', sans-serif !important;
            box-shadow: none !important;
        }
        .input-container input:-webkit-autofill,
        .input-container input:-webkit-autofill:hover, 
        .input-container input:-webkit-autofill:focus, 
        .input-container input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #111827 inset !important;
            -webkit-text-fill-color: #e2e8f0 !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        
        .input-container input::placeholder {
            color: #64748b !important;
        }

        .up-btn {
            background-color: #334155;
            color: white;
            border: none;
            border-radius: 50%;
            min-width: 36px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            margin-left: 10px;
            transition: background 0.2s;
        }
        .up-btn:hover {
            background-color: #475569;
        }

        /* Action Pills */
        .pills-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
        }
        .action-pill {
            background-color: transparent;
            border: 1px solid #1f2937;
            color: #94a3b8;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }
        .action-pill:hover {
            background-color: #1e293b;
            color: white;
        }

        /* Chat Window overlay */
        #chat-window {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 80px; /* Leave space for input */
            padding: 40px 20px;
            background-color: #0B0F19;
            z-index: 10;
            overflow-y: auto;
            flex-direction: column;
            align-items: center;
        }
        
        #chat-window::-webkit-scrollbar {
            width: 8px;
        }
        #chat-window::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }

        #chat-history-container {
            width: 100%;
            max-width: 700px; /* Centers the chat text exactly to match the input box */
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 100%;
            width: auto;
            margin-bottom: 24px;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .message.user {
            background-color: #1e293b;
            border: 1px solid #334155;
            align-self: flex-end;
            margin-left: auto;
            color: #f1f5f9;
            border-bottom-right-radius: 4px;
            max-width: 85%;
        }
        .message.bot {
            background-color: transparent;
            border: none;
            color: #e2e8f0;
            align-self: flex-start;
            padding-left: 0;
            padding-right: 0;
        }

        .input-wrapper-absolute {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 700px;
            z-index: 20;
            box-sizing: border-box;
            padding: 0 10px;
        }
        
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <!-- Layers icon from screenshot -->
            <svg viewBox="0 0 24 24"><path d="M11.998 2L2 6.998l9.998 4.998 9.998-4.998L11.998 2zm0 13.996l-9.998-4.998L2 12.002l9.998 4.998 9.998-4.998-.002-1.004-9.998 4.998zm0 5l-9.998-4.998L2 17l9.998 4.998L21.996 17l-.002-1.002-9.996 4.998z"/></svg>
            AIChat
        </div>
        
        <div class="sidebar-item" onclick="startNewChat()">
            <div class="left-icon"><span class="emoji">📝</span> New Chat</div>
        </div>
        <div class="sidebar-item" onclick="focusSearch()">
            <div class="left-icon"><span class="emoji">🔍</span> Search</div>
        </div>
        
        <div class="sidebar-section" id="today-label" style="display: none;">TODAY</div>
        <div id="today-history">
            <!-- Dynamic history will be appended here -->
        </div>
        
        <!-- Added a button to clear history/projects as requested -->
        <div style="margin-top: auto; padding-top: 20px;">
            <div class="sidebar-item" onclick="clearHistory()" style="color: #ef4444;">
                <div class="left-icon"><span class="emoji">🗑️</span> Clear History</div>
            </div>
        </div>
    </div>

    <!-- MAIN CHAT AREA -->
    <div class="chat-area">
        
        <!-- CHAT HISTORY WINDOW (Hidden initially) -->
        <div id="chat-window">
            <div id="chat-history-container"></div>
        </div>

        <!-- INITIAL GREETING -->
        <div class="center-content" id="greeting-screen">
            <h1 class="greeting">Hey, How Can I Assist?</h1>
            <p class="subtitle">AI Chat is our smartest and fastest chatbot — built to give you<br>accurate, helpful answers every time.</p>
            
            <div class="input-container">
                <input type="text" id="prompt-input" placeholder="Ask me anything..." onkeypress="handleEnter(event)" autocomplete="off">
                <button class="up-btn" onclick="sendMessage()">↑</button>
            </div>
            
            <div class="pills-container">
                <button class="action-pill" onclick="setPrompt('Deep Search')">🔍 Deep Search</button>
                <button class="action-pill" onclick="setPrompt('Create Images')">🖼️ Create Images</button>
                <button class="action-pill" onclick="setPrompt('Latest News')">📰 Latest News</button>
                <button class="action-pill" onclick="setPrompt('Generate Video')">▶️ Generate Video</button>
            </div>
        </div>

        <!-- ABSOLUTE INPUT FOR WHEN CHAT IS ACTIVE -->
        <div class="input-wrapper-absolute" id="active-input" style="display: none;">
            <div class="input-container" style="margin-bottom:0;">
                <input type="text" id="prompt-input-active" placeholder="Ask me anything..." onkeypress="handleEnterActive(event)" autocomplete="off">
                <button class="up-btn" onclick="sendMessageActive()">↑</button>
            </div>
        </div>
    </div>

    <script>
        let isChatting = false;
        let isGenerating = false;
        let currentChatTitle = null;
        
        const chatWindow = document.getElementById("chat-window");
        const greetingScreen = document.getElementById("greeting-screen");
        const activeInput = document.getElementById("active-input");
        const chatHistoryContainer = document.getElementById("chat-history-container");
        const todayHistory = document.getElementById("today-history");
        const input1 = document.getElementById("prompt-input");
        const input2 = document.getElementById("prompt-input-active");

        function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }
        function handleEnterActive(e) { if(e.key === 'Enter') sendMessageActive(); }

        function focusSearch() {
            if (isChatting) input2.focus();
            else input1.focus();
        }

        function setPrompt(text) {
            input1.value = text;
            sendMessage();
        }

        function startNewChat() {
            if (isGenerating) return;
            isChatting = false;
            currentChatTitle = null;
            chatHistoryContainer.innerHTML = "";
            greetingScreen.style.display = "flex";
            chatWindow.style.display = "none";
            activeInput.style.display = "none";
            input1.value = "";
            
            // Remove active state from sidebar items
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active');
            });
        }

        function loadChat(element, title) {
            if (isGenerating) return;
            
            // Set active state
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
            
            // Mock loading a chat
            isChatting = true;
            currentChatTitle = title;
            greetingScreen.style.display = "none";
            chatWindow.style.display = "flex";
            activeInput.style.display = "block";
            
            chatHistoryContainer.innerHTML = "";
            
            const userMsg = document.createElement("div");
            userMsg.className = "message user";
            userMsg.innerText = "Show me the " + title;
            chatHistoryContainer.appendChild(userMsg);
            
            const botMsg = document.createElement("div");
            botMsg.className = "message bot";
            botMsg.innerText = "Here is the information you requested regarding " + title + ".\\n\\nThis is a mocked history load. In a full production app, this would fetch from a database.";
            chatHistoryContainer.appendChild(botMsg);
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function clearHistory() {
            if (isGenerating) return;
            todayHistory.innerHTML = "";
            const todayLabel = document.getElementById('today-label');
            if (todayLabel) todayLabel.style.display = 'none';
            startNewChat();
        }

        function addToHistory(title) {
            if (currentChatTitle) return; // Already in a chat
            
            currentChatTitle = title;
            const shortTitle = title.length > 25 ? title.substring(0, 25) + "..." : title;
            
            // Remove active from all
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active');
            });

            const todayLabel = document.getElementById('today-label');
            if (todayLabel) todayLabel.style.display = 'block';
            
            const newItem = document.createElement("div");
            newItem.className = "sidebar-item active";
            newItem.onclick = function() { loadChat(this, title); };
            newItem.innerHTML = `<div class="left-icon">${shortTitle}</div>`;
            
            // Add to top of today
            todayHistory.insertBefore(newItem, todayHistory.firstChild);
        }

        async function triggerChat(prompt) {
            if (!prompt.trim() || isGenerating) return;
            isGenerating = true;
            
            if (!isChatting) {
                addToHistory(prompt);
                isChatting = true;
                greetingScreen.style.display = "none";
                chatWindow.style.display = "flex";
                activeInput.style.display = "block";
            }

            // Add user message
            const userMsg = document.createElement("div");
            userMsg.className = "message user";
            userMsg.innerText = prompt;
            chatHistoryContainer.appendChild(userMsg);

            // Add empty bot message
            const botMsg = document.createElement("div");
            botMsg.className = "message bot";
            botMsg.innerHTML = "<span style='opacity:0.5'>Thinking...</span>";
            chatHistoryContainer.appendChild(botMsg);
            
            chatWindow.scrollTop = chatWindow.scrollHeight;

            input1.value = "";
            input2.value = "";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                botMsg.innerHTML = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, {stream: true});
                    botMsg.innerHTML += chunk.replace(/\\n/g, "<br>");
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
            } catch (error) {
                botMsg.innerHTML = "<span style='color:#ef4444'>[Error connecting to server]</span>";
            }
            
            isGenerating = false;
        }

        function sendMessage() { triggerChat(input1.value); }
        function sendMessageActive() { triggerChat(input2.value); }
    </script>
</body>
</html>
